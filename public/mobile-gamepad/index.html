<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Battle Cities Controller</title>
  <style>
    :root {
      color-scheme: dark;
      --controller-width: 100vw;
      --controller-height: 100vh;
      --button-size: 92px;
      --stick-size: 240px;
      --stick-nub-size: 96px;
      --gold: #ffae0a;
      --ink: #090b0f;
      --panel: #141922;
      --panel-strong: #202936;
      --line: #3b4658;
      --text: #f6f7fb;
      --muted: #aeb7c7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html,
    body {
      background:
        linear-gradient(90deg, rgba(255, 174, 10, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 174, 10, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 50% 30%, #202936 0, var(--ink) 52%);
      background-size: 28px 28px, 28px 28px, auto;
      color: var(--text);
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      touch-action: none;
      user-select: none;
      width: 100%;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
    }

    body {
      align-items: center;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .controller-shell {
      box-sizing: border-box;
      display: grid;
      grid-template-rows: 58px 1fr;
      height: var(--controller-height);
      left: 50%;
      padding: 14px 18px 18px;
      position: fixed;
      top: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center;
      width: var(--controller-width);
    }

    .controller-header {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      min-height: 44px;
      pointer-events: none;
      position: relative;
      z-index: 2;
    }

    .brand {
      color: var(--gold);
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    .status {
      background: rgba(20, 25, 34, 0.86);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      padding: 12px 14px;
      text-transform: uppercase;
    }

    .status.connected {
      border-color: var(--gold);
      color: var(--gold);
    }

    .controller-stage {
      position: relative;
    }

    .stick-zone,
    .button-zone {
      align-items: center;
      display: flex;
      justify-content: center;
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 42%;
    }

    .stick-zone {
      left: 0;
    }

    .button-zone {
      right: 0;
    }

    .stick {
      background: rgba(246, 247, 251, 0.08);
      border: 3px solid rgba(246, 247, 251, 0.36);
      border-radius: 50%;
      height: var(--stick-size);
      position: relative;
      width: var(--stick-size);
    }

    .stick-guide {
      background: rgba(255, 174, 10, 0.18);
      left: 50%;
      position: absolute;
      top: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .stick-guide.vertical {
      height: 72%;
      width: 4px;
    }

    .stick-guide.horizontal {
      height: 4px;
      width: 72%;
    }

    .stick-guide.diagonal-a,
    .stick-guide.diagonal-b {
      height: 4px;
      width: 72%;
    }

    .stick-guide.diagonal-a {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .stick-guide.diagonal-b {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .stick-arrow {
      color: rgba(246, 247, 251, 0.7);
      font-size: 26px;
      font-weight: 900;
      left: 50%;
      line-height: 1;
      pointer-events: none;
      position: absolute;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
      top: 50%;
      transform:
        translate(-50%, -50%)
        rotate(var(--angle))
        translateY(calc(var(--stick-size) * -0.41))
        rotate(calc(-1 * var(--angle)));
    }

    .stick-nub {
      background: var(--gold);
      border-radius: 50%;
      box-shadow:
        inset 0 -8px 0 rgba(0, 0, 0, 0.18),
        0 0 0 8px rgba(255, 174, 10, 0.2);
      height: var(--stick-nub-size);
      left: 50%;
      pointer-events: none;
      position: absolute;
      top: 50%;
      transform: translate(calc(-50% + var(--stick-x, 0px)), calc(-50% + var(--stick-y, 0px)));
      width: var(--stick-nub-size);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, var(--button-size));
      grid-template-rows: repeat(2, var(--button-size));
      gap: 18px;
    }

    .pad-button {
      align-items: center;
      background: var(--panel-strong);
      border: 3px solid var(--line);
      border-radius: 50%;
      color: var(--text);
      display: flex;
      font-size: 34px;
      font-weight: 900;
      justify-content: center;
      touch-action: none;
    }

    .pad-button.pressed {
      background: var(--gold);
      border-color: var(--text);
      color: var(--ink);
    }

    .pad-button[data-button="2"] {
      grid-column: 1;
      grid-row: 1;
    }

    .pad-button[data-button="3"] {
      grid-column: 2;
      grid-row: 1;
    }

    .pad-button[data-button="0"] {
      grid-column: 2;
      grid-row: 2;
    }

    .pad-button[data-button="1"] {
      grid-column: 3;
      grid-row: 2;
    }

    .hint {
      display: none;
      bottom: 0;
      color: var(--muted);
      font-size: 13px;
      left: 50%;
      line-height: 1.2;
      pointer-events: none;
      position: absolute;
      text-align: center;
      transform: translateX(-50%);
      width: min(420px, 90vw);
      z-index: 2;
    }

    @media (orientation: portrait) {
      .controller-shell {
        transform: translate(-50%, -50%) rotate(90deg);
      }
    }

    body.portrait .controller-shell {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    dialog {
      background: #b3212b;
      border: 0;
      border-radius: 6px;
      color: #fff;
      font: 16px system-ui, sans-serif;
      max-width: 86vw;
      padding: 16px 40px 16px 16px;
    }
  </style>
</head>
<body>
  <section class="controller-shell" data-controller-shell>
    <header class="controller-header">
      <div class="brand">Battle Cities</div>
      <div class="status" data-status>Connecting</div>
    </header>
    <main class="controller-stage">
      <div class="stick-zone" data-stick-zone>
        <div class="stick" data-stick>
          <div class="stick-guide vertical"></div>
          <div class="stick-guide horizontal"></div>
          <div class="stick-guide diagonal-a"></div>
          <div class="stick-guide diagonal-b"></div>
          <div class="stick-arrow" style="--angle: 0deg">▲</div>
          <div class="stick-arrow" style="--angle: 45deg">▲</div>
          <div class="stick-arrow" style="--angle: 90deg">▲</div>
          <div class="stick-arrow" style="--angle: 135deg">▲</div>
          <div class="stick-arrow" style="--angle: 180deg">▲</div>
          <div class="stick-arrow" style="--angle: 225deg">▲</div>
          <div class="stick-arrow" style="--angle: 270deg">▲</div>
          <div class="stick-arrow" style="--angle: 315deg">▲</div>
          <div class="stick-nub" data-stick-nub></div>
        </div>
      </div>
      <div class="button-zone">
        <div class="buttons">
          <div class="pad-button" data-button="2">X</div>
          <div class="pad-button" data-button="3">Y</div>
          <div class="pad-button" data-button="0">A</div>
          <div class="pad-button" data-button="1">B</div>
        </div>
      </div>
      <div class="hint">Left pad moves. A fires. X rapid fires.</div>
    </main>
  </section>
  <script>
    (function () {
      const shell = document.querySelector('[data-controller-shell]');

      function fitController() {
        const viewportWidth = window.visualViewport?.width || window.innerWidth;
        const viewportHeight = window.visualViewport?.height || window.innerHeight;
        const isPortrait = viewportHeight > viewportWidth;
        const controllerWidth = isPortrait ? viewportHeight : viewportWidth;
        const controllerHeight = isPortrait ? viewportWidth : viewportHeight;
        const shortSide = Math.min(controllerWidth, controllerHeight);
        const longSide = Math.max(controllerWidth, controllerHeight);
        const isFullscreen = document.fullscreenElement !== null || document.webkitFullscreenElement !== null;
        const stickMax = isFullscreen ? 430 : 560;
        const buttonMax = isFullscreen ? 168 : 220;
        const stickSize = Math.min(shortSide * 0.72, longSide * 0.34, stickMax);
        const buttonSize = Math.min(shortSide * 0.23, buttonMax);

        document.body.classList.toggle('portrait', isPortrait);
        shell.style.setProperty('--controller-width', `${controllerWidth}px`);
        shell.style.setProperty('--controller-height', `${controllerHeight}px`);
        shell.style.setProperty('--stick-size', `${stickSize}px`);
        shell.style.setProperty('--stick-nub-size', `${stickSize * 0.4}px`);
        shell.style.setProperty('--button-size', `${buttonSize}px`);
      }

      window.mobileControllerFit = fitController;
      window.addEventListener('resize', fitController);
      window.addEventListener('orientationchange', fitController);
      document.addEventListener('fullscreenchange', fitController);
      document.addEventListener('webkitfullscreenchange', fitController);
      window.visualViewport?.addEventListener('resize', fitController);
      fitController();
    }());
  </script>
  <script>
    const PEER_JS_URL = 'https://unpkg.com/peerjs@1.4.7/dist/peerjs.js';
    const shell = document.querySelector('[data-controller-shell]');
    const status = document.querySelector('[data-status]');
    const stickZone = document.querySelector('[data-stick-zone]');
    const stick = document.querySelector('[data-stick]');
    const stickNub = document.querySelector('[data-stick-nub]');
    const buttons = Array.from(document.querySelectorAll('[data-button]'));
    const queryParams = new URLSearchParams(document.location.search);
    const hashParams = new URLSearchParams(document.location.hash.substr(1));
    const roomCode = queryParams.get('rc') || hashParams.get('rc');
    const buttonState = Array.from({ length: 4 }, () => ({
      pressed: false,
      touched: false,
      value: 0
    }));
    const axes = [0, 0];
    let connected = false;
    let connection = null;
    let lastSentTimestamp = 0;
    let connectionTimeout = null;
    let peerPromise = null;
    let sendQueued = false;
    let lastSentState = '';

    function loadPeer() {
      if (window.Peer !== undefined) {
        return Promise.resolve(window.Peer);
      }

      if (peerPromise !== null) {
        return peerPromise;
      }

      peerPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.onload = () => resolve(window.Peer);
        script.onerror = reject;
        script.src = PEER_JS_URL;
        document.body.appendChild(script);
      });

      return peerPromise;
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    function requestFullscreen() {
      const root = document.documentElement;
      const request = root.requestFullscreen || root.webkitRequestFullscreen;
      if (request === undefined) {
        return Promise.resolve();
      }

      return request.call(root);
    }

    async function requestFullscreenIfNeeded() {
      try {
        if (getFullscreenElement() === null) {
          await requestFullscreen();
        }

        await screen.orientation?.lock?.('landscape');
        window.mobileControllerFit?.();
      } catch (error) {
        // Orientation lock requires a user gesture and is not available in all
        // mobile browsers. The fixed landscape layout still works without it.
      }
    }

    window.mobileControllerFit?.();
    window.addEventListener('contextmenu', (event) => {
      event.preventDefault();
    });

    if (roomCode === null) {
      status.textContent = 'Missing room';
    } else {
      startConnection(roomCode);
    }

    function setConnected() {
      if (connected) {
        return;
      }

      connected = true;
      clearTimeout(connectionTimeout);
      status.textContent = 'Connected';
      status.classList.add('connected');
    }

    async function createPeerId(code) {
      const hash = await crypto.subtle.digest('SHA-1', new TextEncoder('utf-8').encode(code));
      return Array.from(new Uint8Array(hash))
        .map((value) => value.toString(16).padStart(2, '0'))
        .join('');
    }

    async function startConnection(code) {
      connectionTimeout = setTimeout(() => {
        if (connected) {
          return;
        }

        status.textContent = 'Room not found';
      }, 8000);

      const peerId = await createPeerId(code);
      const Peer = await loadPeer();
      const peer = new Peer();
      peer.on('error', showError);
      peer.on('open', () => {
        connection = peer.connect(peerId);
        connection.on('error', showError);
        connection.on('open', () => {
          setConnected();
          sendGamepad(true);
          setInterval(() => sendGamepad(true), 250);
        });
      });
    }

    function getGamepadStateKey() {
      const buttonBits = buttonState.map((button) => button.value).join('');
      return `${axes[0].toFixed(3)},${axes[1].toFixed(3)}:${buttonBits}`;
    }

    function scheduleSend() {
      if (sendQueued) {
        return;
      }

      sendQueued = true;
      requestAnimationFrame(() => {
        sendQueued = false;
        sendGamepad();
      });
    }

    function sendGamepad(force = false) {
      if (connection === null || connection.open !== true) {
        return;
      }

      const timestamp = performance.now();
      const stateKey = getGamepadStateKey();
      if (!force && stateKey === lastSentState) {
        return;
      }

      lastSentTimestamp = timestamp;
      lastSentState = stateKey;
      connection.send({
        type: 'gamepads',
        timestamp: Date.now(),
        gamepads: [{
          axes: axes.slice(),
          buttons: buttonState.map((button) => Object.assign({}, button)),
          connected: true,
          id: 'Battle Cities Mobile Controller',
          index: 0,
          mapping: 'standard',
          timestamp
        }]
      });
    }

    function showError(error) {
      console.error(error);
      status.textContent = 'Error';
    }

    function updateStick(clientX, clientY) {
      const rect = stick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const inputRadius = rect.width / 2;
      const visualRadius = stick.offsetWidth / 2;
      let dx = (clientX - centerX) / inputRadius;
      let dy = (clientY - centerY) / inputRadius;

      if (document.body.classList.contains('portrait')) {
        const rotatedX = dy;
        const rotatedY = -dx;
        dx = rotatedX;
        dy = rotatedY;
      }

      const length = Math.hypot(dx, dy);
      if (length > 1) {
        dx /= length;
        dy /= length;
      }

      axes[0] = dx;
      axes[1] = dy;

      const visualTravel = visualRadius;
      stickNub.style.setProperty('--stick-x', `${dx * visualTravel}px`);
      stickNub.style.setProperty('--stick-y', `${dy * visualTravel}px`);
      setConnected();
      scheduleSend();
    }

    function resetStick() {
      axes[0] = 0;
      axes[1] = 0;
      stickNub.style.setProperty('--stick-x', '0px');
      stickNub.style.setProperty('--stick-y', '0px');
      scheduleSend();
    }

    let stickPointerId = null;
    stickZone.addEventListener('pointerdown', (event) => {
      requestFullscreenIfNeeded();
      stickPointerId = event.pointerId;
      stickZone.setPointerCapture(stickPointerId);
      updateStick(event.clientX, event.clientY);
    });
    stickZone.addEventListener('pointermove', (event) => {
      if (event.pointerId !== stickPointerId) {
        return;
      }

      updateStick(event.clientX, event.clientY);
    });
    stickZone.addEventListener('pointerrawupdate', (event) => {
      if (event.pointerId !== stickPointerId) {
        return;
      }

      updateStick(event.clientX, event.clientY);
    });
    stickZone.addEventListener('lostpointercapture', () => {
      stickPointerId = null;
      resetStick();
    });

    buttons.forEach((button) => {
      const index = Number(button.dataset.button);
      const setButton = (pressed) => {
        buttonState[index].pressed = pressed;
        buttonState[index].touched = pressed;
        buttonState[index].value = pressed ? 1 : 0;
        button.classList.toggle('pressed', pressed);
        setConnected();
        scheduleSend();
      };

      button.addEventListener('pointerdown', (event) => {
        requestFullscreenIfNeeded();
        button.setPointerCapture(event.pointerId);
        setButton(true);
      });
      button.addEventListener('lostpointercapture', () => {
        setButton(false);
      });
    });
  </script>
</body>
</html>
